[tools]
go = "latest"
node = "20"

[tasks.activate]
description = "Build and run the CLI from source"
run = '''
#!/usr/bin/env bash
set -euo pipefail
cd cli
go build -o /tmp/activate-dev .
/tmp/activate-dev "$@"
'''

[tasks.release]
description = "Bump version, open a PR, and create a GitHub release after merge"
run = '''
#!/usr/bin/env bash
set -euo pipefail

CLI_VERSION_FILE="cli/main.go"
EXT_VERSION_FILE="extension/package.json"

# Ensure we're on main and up to date
CURRENT_BRANCH=$(git branch --show-current)
if [[ "$CURRENT_BRANCH" != "main" ]]; then
  echo "ERROR: Must be on main to start a release (currently on '$CURRENT_BRANCH')"
  exit 1
fi
git pull --ff-only origin main

# Read current versions
CLI_VERSION=$(grep 'const version' "$CLI_VERSION_FILE" | head -1 | cut -d'"' -f2)
EXT_VERSION=$(grep '"version"' "$EXT_VERSION_FILE" | head -1 | sed 's/.*"\([0-9][^"]*\)".*/\1/')

echo "Current versions:"
echo "  CLI:       v${CLI_VERSION}"
echo "  Extension: v${EXT_VERSION}"
echo ""

# Ask for bump type
echo "What kind of release?"
echo "  1) patch  (e.g. 0.1.0 → 0.1.1)"
echo "  2) minor  (e.g. 0.1.0 → 0.2.0)"
echo "  3) major  (e.g. 0.1.0 → 1.0.0)"
echo "  4) pre-release (e.g. 0.1.0 → 0.1.1-rc.1)"
echo "  5) revision bump (e.g. 0.1.1-r1 → 0.1.1-r2)"
echo "  6) custom (enter version manually)"
read -rp "Choice [1-6]: " BUMP_TYPE

IFS='.' read -r MAJOR MINOR PATCH <<< "$CLI_VERSION"
# Strip any pre-release suffix from patch for arithmetic
PATCH_NUM="${PATCH%%-*}"

case "$BUMP_TYPE" in
  1) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH_NUM + 1))" ;;
  2) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
  3) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
  4)
    read -rp "Pre-release label [rc.1]: " PRE_LABEL
    PRE_LABEL="${PRE_LABEL:-rc.1}"
    NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH_NUM + 1))-${PRE_LABEL}"
    ;;
  5)
    # Auto-increment the -rN suffix
    BASE="${MAJOR}.${MINOR}.${PATCH_NUM}"
    if [[ "$CLI_VERSION" =~ -r([0-9]+)$ ]]; then
      CURRENT_R="${BASH_REMATCH[1]}"
      NEW_VERSION="${BASE}-r$((CURRENT_R + 1))"
    else
      # No -rN suffix yet — start at r1
      NEW_VERSION="${BASE}-r1"
    fi
    ;;
  6)
    read -rp "Enter version (without v prefix): " NEW_VERSION
    ;;
  *)
    echo "Invalid choice"; exit 1 ;;
esac

IS_PRERELEASE=false
[[ "$NEW_VERSION" == *-* ]] && IS_PRERELEASE=true

echo ""
echo "New version: v${NEW_VERSION}"
echo "Pre-release: ${IS_PRERELEASE}"
read -rp "Continue? [y/N]: " CONFIRM
[[ "$CONFIRM" != "y" && "$CONFIRM" != "Y" ]] && echo "Aborted." && exit 0

# Create release branch
RELEASE_BRANCH="release/v${NEW_VERSION}"
git checkout -b "$RELEASE_BRANCH"

# Bump CLI version
sed -i.bak "s/const version = \"${CLI_VERSION}\"/const version = \"${NEW_VERSION}\"/" "$CLI_VERSION_FILE"
rm -f "${CLI_VERSION_FILE}.bak"

# Bump extension version (full version including any pre-release suffix)
cd extension && npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version && npm install --package-lock-only && cd ..

# Store full release tag in extension package.json for install script URL resolution
sed -i.bak "s/\"releaseTag\": \"[^\"]*\"/\"releaseTag\": \"v${NEW_VERSION}\"/" "$EXT_VERSION_FILE"
rm -f "${EXT_VERSION_FILE}.bak"

echo "✓ Bumped CLI to v${NEW_VERSION}"
echo "✓ Bumped extension to v${NEW_VERSION}"

# Commit and push branch
git add "$CLI_VERSION_FILE" "$EXT_VERSION_FILE" extension/package-lock.json
git commit -m "chore: bump version to v${NEW_VERSION}"
git push origin "$RELEASE_BRANCH"

# Open PR
PRERELEASE_FLAG=""
$IS_PRERELEASE && PRERELEASE_FLAG="--prerelease"

PR_URL=$(gh pr create \
  --base main \
  --head "$RELEASE_BRANCH" \
  --title "chore: release v${NEW_VERSION}" \
  --body "Bumps CLI and extension to v${NEW_VERSION}.")

echo ""
echo "✓ PR opened: ${PR_URL}"
echo ""
read -rp "Merge the PR, then press Enter to tag and create the release... "

# Return to main and pull the merge
git checkout main
git pull --ff-only origin main

# Tag and push
git tag "v${NEW_VERSION}"
git push origin "v${NEW_VERSION}"

# Create GitHub release
gh release create "v${NEW_VERSION}" $PRERELEASE_FLAG \
  --title "v${NEW_VERSION}" \
  --generate-notes

# Clean up release branch
git branch -D "$RELEASE_BRANCH"
git push origin --delete "$RELEASE_BRANCH" 2>/dev/null || true

echo ""
echo "✓ Release v${NEW_VERSION} created!"
echo "  CI will build and attach CLI binaries + VSIX automatically."
'''
