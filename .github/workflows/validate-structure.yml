name: Validate Plugin Structure

on:
  push:
    branches: [main, 'feat/**']
    paths: ['plugins/**', 'manifests/**', 'framework/**']
  pull_request:
    paths: ['plugins/**', 'manifests/**', 'framework/**']

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate plugin structure
        run: node framework/validate-structure.mjs
