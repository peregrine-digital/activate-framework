name: Desktop App

on:
  push:
    branches: [main, 'feat/**']
    paths: ['desktop/**', 'ui/**']
  pull_request:
    paths: ['desktop/**', 'ui/**']
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install shared UI dependencies
        working-directory: ui
        run: npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: desktop
        run: wails build -tags webkit2_41

      - name: Test Go
        working-directory: desktop
        run: go test ./...

      - name: Test UI
        working-directory: ui
        run: npx vitest run

  release-build:
    if: github.event_name == 'release'
    needs: build-and-test
    strategy:
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: macos-13
            goos: darwin
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: desktop/go.mod
          cache-dependency-path: desktop/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Cross-compilation for Linux arm64
      - name: Install cross-compilation tools (arm64)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64

      - name: Install shared UI dependencies
        working-directory: ui
        run: npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        working-directory: desktop/frontend
        run: npm install --legacy-peer-deps

      - name: Build desktop app
        working-directory: desktop
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          TAGS=""

          if [ "$GOOS" = "linux" ]; then
            TAGS="-tags webkit2_41"
          fi

          if [ "$GOOS" = "linux" ] && [ "$GOARCH" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CGO_ENABLED=1
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          fi

          wails build -ldflags "${LDFLAGS}" ${TAGS} -platform "${GOOS}/${GOARCH}"

      # Ad-hoc sign macOS binaries
      - name: Sign macOS binary
        if: matrix.goos == 'darwin'
        run: codesign -s - "desktop/build/bin/activate-desktop.app/Contents/MacOS/activate-desktop"

      - name: Package artifacts
        working-directory: desktop
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OS="${{ matrix.goos }}"
          ARCH="${{ matrix.goarch }}"
          mkdir -p dist

          if [ "$OS" = "darwin" ]; then
            ARCHIVE="activate-desktop_${VERSION}_${OS}-${ARCH}.zip"
            (cd build/bin && zip -r "../../dist/${ARCHIVE}" activate-desktop.app)
          elif [ "$OS" = "windows" ]; then
            ARCHIVE="activate-desktop_${VERSION}_${OS}-${ARCH}.zip"
            (cd build/bin && zip "../../dist/${ARCHIVE}" activate-desktop.exe)
          else
            ARCHIVE="activate-desktop_${VERSION}_${OS}-${ARCH}.tar.gz"
            tar -czf "dist/${ARCHIVE}" -C build/bin activate-desktop
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.goos }}-${{ matrix.goarch }}
          path: desktop/dist/*

  release-publish:
    if: github.event_name == 'release'
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > desktop-checksums.txt

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
