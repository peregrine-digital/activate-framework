name: CLI

on:
  push:
    branches: [main, 'feat/**']
    paths: ['cli/**']
  pull_request:
    paths: ['cli/**']
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build
        run: go build -ldflags "-s -w" -o activate .

      - name: Test
        run: go test ./...

  release-build:
    if: github.event_name == 'release'
    needs: build-and-test
    strategy:
      matrix:
        include:
          - runner: macos-latest
            targets: darwin-arm64 darwin-amd64
          - runner: ubuntu-latest
            targets: linux-arm64 linux-amd64 windows-amd64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Build and package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          for plat in ${{ matrix.targets }}; do
            OS="${plat%%-*}"
            ARCH="${plat##*-}"
            EXT=""
            ARCHIVE_EXT="tar.gz"
            [ "$OS" = "windows" ] && EXT=".exe" && ARCHIVE_EXT="zip"

            echo "Building ${OS}/${ARCH}..."
            CGO_ENABLED=0 GOOS="$OS" GOARCH="$ARCH" go build -ldflags "-s -w" -o "staging/activate${EXT}" .

            # Ad-hoc sign on macOS so binaries run on Apple Silicon
            if [ "$OS" = "darwin" ] && command -v codesign &>/dev/null; then
              codesign -s - "staging/activate"
            fi

            ARCHIVE_NAME="activate-framework_${VERSION}_${OS}-${ARCH}.${ARCHIVE_EXT}"
            mkdir -p dist
            if [ "$ARCHIVE_EXT" = "zip" ]; then
              (cd staging && zip "../dist/${ARCHIVE_NAME}" "activate${EXT}")
            else
              tar -czf "dist/${ARCHIVE_NAME}" -C staging "activate${EXT}"
            fi
            rm -rf staging
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.runner }}
          path: cli/dist/*

  release-publish:
    if: github.event_name == 'release'
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz *.zip > checksums.txt

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
